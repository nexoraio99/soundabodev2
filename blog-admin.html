<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin Dashboard | Soundabode Blog</title>
  
  <link rel="stylesheet" href="style/style.css">
  <link rel="stylesheet" href="style/blog.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
    #admin-panel { display: none; }
    #login-panel { padding-top: 15vh; max-width: 400px; margin: 0 auto; text-align: center; }
  </style>
</head>

<body>

  <!-- LOGIN PANEL -->
  <div id="login-panel" class="blog-card">
    <h2 class="blog-title" style="font-size: 1.5rem;">Admin Access</h2>
    <p style="color: #64748B; margin-bottom: 30px;">Authenticate to publish blog posts.</p>
    
    <div class="admin-form-group">
      <input type="password" id="admin-pass" class="admin-input" placeholder="Password: admin">
    </div>
    <button class="admin-btn" onclick="checkPass()">Login</button>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin-panel" class="blog-container">
    <header style="text-align: center; padding-bottom: 50px;">
        <h1 class="blog-title" style="font-size: 3rem;">Publish New Blog</h1>
        <p style="color: #64748B;">Reach your audience instantly.</p>
    </header>

    <div class="admin-card">
      <form id="blog-form">
        <div class="admin-form-group">
          <label class="admin-label">Image URL</label>
          <input type="text" id="imageUrl" class="admin-input" placeholder="e.g. Assets/blog-image.jpg">
        </div>
        <div class="admin-form-row" style="display: flex; gap: 20px;">
          <div class="admin-form-group" style="flex: 1;">
            <label class="admin-label">Category</label>
            <select id="category" class="admin-input">
              <option value="Production">Production</option>
              <option value="DJ Performance">DJ Performance</option>
              <option value="Events">Events</option>
              <option value="Academy News">Academy News</option>
              <option value="General" selected>General</option>
            </select>
          </div>
          <div class="admin-form-group" style="flex: 1;">
            <label class="admin-label">Author</label>
            <input type="text" id="author" class="admin-input" placeholder="e.g. Harsh V" value="Soundabode">
          </div>
        </div>
        <div class="admin-form-group">
          <label class="admin-label">Content</label>
          <textarea id="content" class="admin-textarea" rows="10" placeholder="Write your blog post here..." required></textarea>
        </div>
        <div class="admin-form-group">
            <label class="admin-label">Confirm Password to Publish</label>
            <input type="password" id="publish-pass" class="admin-input" placeholder="Enter admin password again" required>
        </div>
        <button type="submit" id="submit-btn" class="admin-btn">Publish Blog Post</button>
      </form>
    </div>

    <div style="text-align: center; margin-top: 40px;">
        <a href="blog.html" style="color: #64748B; text-decoration: none; font-size: 0.9rem;">&larr; Back to Public Blog</a>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const loginPanel = document.getElementById('login-panel');
    const adminPanel = document.getElementById('admin-panel');
    const blogForm = document.getElementById('blog-form');
    const submitBtn = document.getElementById('submit-btn');

    function checkPass() {
      const pass = document.getElementById('admin-pass').value;
      if (pass === 'admin') {
        loginPanel.style.display = 'none';
        adminPanel.style.display = 'block';
      } else {
        alert('Invalid password! Hint: admin');
      }
    }

    blogForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const blogData = {
        heading: document.getElementById('heading').value,
        subheading: document.getElementById('subheading').value,
        content: document.getElementById('content').value,
        imageUrl: document.getElementById('imageUrl').value,
        category: document.getElementById('category').value,
        author: document.getElementById('author').value,
        password: document.getElementById('publish-pass').value
      };

      submitBtn.innerText = 'Publishing...';
      submitBtn.disabled = true;

      try {
        const response = await fetch('/api/blogs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(blogData)
        });

        const result = await response.json();

        if (response.ok) {
          alert('Blog Published Successfully! It is now live on the website.');
          blogForm.reset();
        } else {
          alert(result.message || 'Failed to publish blog.');
        }
      } catch (err) {
        console.error(err);
        alert('Error connecting to server.');
      } finally {
        submitBtn.innerText = 'Publish Blog Post';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
