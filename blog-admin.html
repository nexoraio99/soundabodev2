<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin Dashboard | Soundabode Blog</title>
  
  <link rel="stylesheet" href="/style/style.css">
  <link rel="stylesheet" href="/style/blog.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/style/blog-admin.css">
</head>

<body>

  <!-- LOGIN PANEL -->
  <div id="login-panel" class="blog-card">
    <h2 class="blog-title" style="font-size: 1.5rem;">Admin Access</h2>
    <p style="color: #64748B; margin-bottom: 30px;">Authenticate to publish blog posts.</p>
    
    <div class="admin-form-group">
      <input type="password" id="admin-pass" class="admin-input" placeholder="Password: admin">
    </div>
    <button id="login-btn" class="admin-btn">Login</button>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin-panel" class="blog-container">
    <header style="text-align: center; padding-bottom: 50px;">
        <h1 class="blog-title" style="font-size: 3rem;">Publish New Blog</h1>
        <p style="color: #64748B;">Reach your audience instantly.</p>
    </header>

    <div class="admin-card">
      <form id="blog-form">
        <input type="hidden" id="edit-id" value="">

        <!-- Content Section -->
        <div class="admin-section-header">
          <span class="admin-section-icon">📝</span> Content
        </div>

        <div class="admin-form-group">
          <label class="admin-label">Blog Heading</label>
          <input type="text" id="heading" class="admin-input" placeholder="e.g. Master Your Mix" required>
        </div>
        <div class="admin-form-group">
          <label class="admin-label">Short Subheading</label>
          <input type="text" id="subheading" class="admin-input" placeholder="e.g. 5 Professional techniques for clarity" required>
        </div>
        <div class="admin-form-group">
          <label class="admin-label">Image URL</label>
          <input type="text" id="imageUrl" class="admin-input" placeholder="e.g. Assets/blog-image.jpg">
        </div>
        <div class="admin-form-row" style="display: flex; gap: 20px;">
          <div class="admin-form-group" style="flex: 1;">
            <label class="admin-label">Category</label>
            <select id="category" class="admin-input">
              <option value="Production">Production</option>
              <option value="DJ Performance">DJ Performance</option>
              <option value="Events">Events</option>
              <option value="Academy News">Academy News</option>
              <option value="General" selected>General</option>
            </select>
          </div>
          <div class="admin-form-group" style="flex: 1;">
            <label class="admin-label">Author</label>
            <input type="text" id="author" class="admin-input" placeholder="e.g. Harsh V" value="Soundabode">
          </div>
        </div>
        <div class="admin-form-group">
          <label class="admin-label">Content</label>
          <textarea id="content" class="admin-textarea" rows="10" placeholder="Write your blog post here..." required></textarea>
        </div>

        <!-- SEO Section -->
        <div class="admin-section-header">
          <span class="admin-section-icon">🔍</span> SEO Settings
        </div>

        <div class="admin-form-group">
          <label class="admin-label">Meta Title <span class="admin-hint">(Overrides heading for search engines — max 60 chars)</span></label>
          <input type="text" id="metaTitle" class="admin-input" placeholder="e.g. Master Your Mix | Soundabode Blog" maxlength="70">
          <div class="admin-char-count" id="metaTitle-count">0 / 60</div>
        </div>
        <div class="admin-form-group">
          <label class="admin-label">Meta Description <span class="admin-hint">(Appears in Google results — max 160 chars)</span></label>
          <textarea id="metaDescription" class="admin-textarea" rows="3" placeholder="Write a compelling summary for search results..." maxlength="170"></textarea>
          <div class="admin-char-count" id="metaDescription-count">0 / 160</div>
        </div>
        <div class="admin-form-group">
          <label class="admin-label">Meta Image / OG Image URL <span class="admin-hint">(Social share preview image)</span></label>
          <input type="text" id="metaImage" class="admin-input" placeholder="e.g. https://soundabode.com/Assets/og-image.jpg">
        </div>

        <!-- GEO Section -->
        <div class="admin-section-header">
          <span class="admin-section-icon">🌍</span> Geographic Targeting
        </div>

        <div class="admin-form-group">
          <label class="admin-label">Geo Target <span class="admin-hint">(Target region for this post)</span></label>
          <select id="geoTarget" class="admin-input">
            <option value="" selected>Global (No targeting)</option>
            <option value="IN">India</option>
            <option value="IN-MH">Maharashtra, India</option>
            <option value="IN-DL">Delhi, India</option>
            <option value="IN-KA">Karnataka, India</option>
            <option value="US">United States</option>
            <option value="GB">United Kingdom</option>
            <option value="AE">UAE</option>
            <option value="SG">Singapore</option>
          </select>
        </div>

        <!-- Publish Section -->
        <div class="admin-section-header">
          <span class="admin-section-icon">🔐</span> Publish
        </div>

        <div class="admin-form-group">
            <label class="admin-label">Confirm Password to Publish</label>
            <input type="password" id="publish-pass" class="admin-input" placeholder="Enter admin password again" required>
        </div>
        <div style="display: flex; gap: 12px;">
          <button type="submit" id="submit-btn" class="admin-btn" style="flex: 1;">Publish Blog Post</button>
          <button type="button" id="cancel-edit-btn" class="admin-btn admin-btn-secondary" style="flex: 0.4; display: none;">Cancel Edit</button>
        </div>
      </form>
    </div>

    <div class="admin-card" style="margin-top: 40px; padding: 30px;">
      <h2 class="blog-title" style="font-size: 1.8rem; margin-bottom: 20px;">Manage Published Blogs</h2>
      <div id="blog-list" style="display: flex; flex-direction: column; gap: 15px;">
        <p style="color: var(--text-muted);">Loading blogs...</p>
      </div>
    </div>

    <div style="text-align: center; margin-top: 40px;">
        <a href="/blog" style="color: #64748B; text-decoration: none; font-size: 0.9rem;">&larr; Back to Public Blog</a>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="/script/blog-admin.js"></script>
</body>
</html>
